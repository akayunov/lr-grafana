# Panel: Cloud VCA Visitor Counter: Counter API Timings
# Схлопывание HTTP-методов (get, post, и т.д.) внутри каждого API-эндпоинта.
# Позволяет оценить общую пиковую задержку (Latency) конкретного сервиса.
# На выходе получаем ровно 1 график на каждый эндпоинт.
# Важно: используется функция 'max', чтобы наверх поднимался худший пик торможения бэкенда.
# new grafana request: aliasSub(aliasByTags(grep(ivideon.timers.api5.*.all_methods.upper, 'visitor_counter*'), 3), "(^.*$)", "\1 A")
ivideon.timers.api5.<path>.all_methods.upper (10) = max ivideon.timers.api5.<path>.*.upper


# Panel: Main 5xx Errors: General
# Схлопывание балансировщиков (ya_gw01..05) в фоне с сохранением разбивки по сервисам.
# Позволяет Grafana читать 1 суммарный файл на сервис вместо 5 раздельных хостов.
# new grafana request: aliasSub(removeBelowValue(perSecond(summarize(ivideon.gauges.haproxy.all_gateways.*.hrsp_5xx, '5min', 'sum', false)), 0), "(^.*$)", "\1 C")
ivideon.gauges.haproxy.all_gateways.<service>.hrsp_5xx (10) = sum ivideon.gauges.haproxy.*.<service>.hrsp_5xx


# Panel: Main 5xx Errors: API5 Stale Requests
# new grafana request: target=aliasSub(sumSeries(sumSeries(ivideon.counters.api5.aggregated.stale_group_A.count, ivideon.counters.api5.aggregated.stale_group_B.count), scale(ivideon.counters.api5.aggregated.stale_wifi.count, -1)), "(^.*$)", "\1 E")
# 1. Собираем в фоне Группу А
ivideon.counters.api5.aggregated.stale_group_A.count (10) = sum ivideon.counters.api5.*.*.stale.count
# 2. Собираем в фоне Группу Б
ivideon.counters.api5.aggregated.stale_group_B.count (10) = sum ivideon.counters.api5.*.*.*.stale.count
# 3. Собираем в фоне Группу В (Wi-Fi)
ivideon.counters.api5.aggregated.stale_wifi.count (10) = sum ivideon.counters.api5.servers.wifi.*.stale.count


# Panel: Main API4: API4 Total RPS
# Фоновое суммирование общего RPS по всем эндпоинтам и методам API4 (Контур EU)
# Избавляет Graphite от налёту-сложения сотен файлов при каждом открытии дашборда
# new grafana request: target=aliasSub(alias(ivideon.timers.api4.aggregated.total_rps.count_ps, 'EU'), "(^.*$)", "\1 A")
ivideon.timers.api4.aggregated.total_rps.count_ps (10) = sum ivideon.timers.api4.*.*.*.count_ps


# Panel: Main API4: Timings (EU)
# Схлопывание пиковых таймингов API4 внутри каждого модуля по максимальному времени ответа.
# Наверх всегда поднимается самый худший пик торможения (благодаря функции 'max').
# Избавляет дашборд от рендеринга сотен линий, оставляя только основные проблемные модули.
# new grafana request: target=aliasSub(removeBelowValue(ivideon.timers.api4.*.all_handlers.all_methods.upper, 1000), "(^.*$)", "\1 A")
ivideon.timers.api4.<module>.all_handlers.all_methods.upper (10) = max ivideon.timers.api4.<module>.*.*.upper


# Main API5: API5 / RPS Total
# Схлопывание общего RPS по всем эндпоинтам API5 (Контур EU)
# Отдельно суммируем простую и глубокую вложенность путей
# new grafana request: target=aliasSub(alias(sumSeries(ivideon.timers.api5.aggregated.total_rps_group_A.count_ps, ivideon.timers.api5.aggregated.total_rps_group_B.count_ps), "EU"), "(^.*$)", "\1 A")
ivideon.timers.api5.aggregated.total_rps_group_A.count_ps (10) = sum ivideon.timers.api5.*.*.count_ps
ivideon.timers.api5.aggregated.total_rps_group_B.count_ps (10) = sum ivideon.timers.api5.*.*.*.count_ps




# Main API5: API5 / RPS by endpoint

# Main API5: API5 / Stale Requests Rate
# использует агрегации из API5 Stale Requests
# new grafana request: target=aliasSub(diffSeries(sumSeries(summarize(ivideon.counters.api5.aggregated.stale_group_B.count, '1h', 'sum', false), summarize(ivideon.counters.api5.aggregated.stale_group_A.count, '1h', 'sum', false)), summarize(ivideon.counters.api5.aggregated.stale_wifi.count, '1h', 'sum', false)), "(^.*$)", "\1 E")


# Main DB: Mongo connection errors
# Схлопывание серверов с сохранением детальной разбивки по типам ошибок БД
# На выходе получаем статистику по типам сбоев (NetworkTimeout, QueryError)
# new grafana request: target=aliasSub(aliasByNode(summarize(ivideon.counters.db_errors.all_analytics_servers.*.count, '5min', 'sum'), 3, 4), "(^.*$)", "\1 A")
ivideon.counters.db_errors.all_analytics_servers.<error_type>.count (10) = sum ivideon.counters.db_errors.*.<error_type>.count


# Main HAProxy Errors: HAProxy / 5xx Errors
# Cхлопывание всего кластера HAProxy в одну метрику
# new grafana request: target=aliasSub(alias(perSecond(ivideon.gauges.haproxy.total_cluster.all_services.hrsp_5xx), 'EU - 5xx (total)'), "(^.*$)", "\1 A")
ivideon.gauges.haproxy.total_cluster.all_services.hrsp_5xx (10) = sum ivideon.gauges.haproxy.*.*.hrsp_5xx


# Main HAProxy Errors: HAProxy / 5xx / EU
# Схлопывание балансировщиков (ya_gw01..05) в фоне с сохранением разбивки по сервисам
# точна такая же есть в # Panel: Main 5xx Errors: General
# new grafana request: target=aliasSub(perSecond(ivideon.gauges.haproxy.all_gateways.*.hrsp_5xx), "(^.*$)", "\1 A")
# ivideon.gauges.haproxy.all_gateways.<service>.hrsp_5xx (10) = sum ivideon.gauges.haproxy.*.<service>.hrsp_5xx


# Main HaProxy rates / timings: HaProxy EU Timings
# Расчет среднего времени ответа (rtime) по всем шлюзам для каждого сервиса в фоне
# На выходе получаем средний Latency по каждому из 40 бэкендов раз в 10 секунд
# new grafana request: target=aliasSub(currentAbove(ivideon.gauges.haproxy.all_gateways.*.rtime, 200), "(^.*$)", "\1 A")
ivideon.gauges.haproxy.all_gateways.<service>.rtime (10) = avg ivideon.gauges.haproxy.*.<service>.rtime




